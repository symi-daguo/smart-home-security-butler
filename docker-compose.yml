services:
  smart-home-butler:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-home-butler:latest
    container_name: smart-home-butler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_ENV=${NODE_ENV:-production}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - PORT=${PORT:-3000}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - OPENROUTER_FALLBACK_MODEL=${OPENROUTER_FALLBACK_MODEL:-openrouter/free}
      - HA_BASE_URL=${HA_BASE_URL:-http://172.17.0.1:8123}
      - HA_TOKEN=${HA_TOKEN}
      - NODERED_BASE_URL=${NODERED_BASE_URL:-http://172.17.0.1:1880}
      - NODERED_TOKEN=${NODERED_TOKEN}
      - KNX_BASE_URL=${KNX_BASE_URL}
      - KNX_TOKEN=${KNX_TOKEN}
      - KNX2_BASE_URL=${KNX2_BASE_URL}
      - KNX2_TOKEN=${KNX2_TOKEN}
      - KNXD_ENV_PATH=${KNXD_ENV_PATH:-/knxd-gateway/.env}
      - KNXD_HOST=${KNXD_HOST:-172.17.0.1}
      - KNXD_PORT=${KNXD_PORT:-3671}
      - KNXD_CONTAINER_NAME=${KNXD_CONTAINER_NAME:-rs232-knx-knxd}
      - KNXD_COLLECTOR_ENABLED=${KNXD_COLLECTOR_ENABLED:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - BARK_DEVICE_KEY=${BARK_DEVICE_KEY}
      - BARK_BASE_URL=${BARK_BASE_URL:-https://api.day.app}
      - SERVERCHAN_SEND_KEY=${SERVERCHAN_SEND_KEY}
      - DETECTION_INTERVAL=${DETECTION_INTERVAL:-300000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ${KNXD_ENV_HOST_PATH:-/DATA/AppData/knx-gateway/.env}:/knxd-gateway/.env
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PORT:-3000}:3000"
    network_mode: bridge
    mem_limit: 256m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: smart-home-butler
  index: /
  port_map: "3000"
  scheme: http
  title:
    en_us: Smart Home Security Butler
    zh_cn: 智能家居 AI 安全管家
  tagline:
    en_us: AI security butler for CasaOS smart home
    zh_cn: CasaOS 本地 AI 智能家居安全管家
  description:
    en_us: |
      Smart Home AI Security Butler - Proactive security monitoring and automation for Home Assistant, Node-RED, and KNX Gateways.

      **Key Features:**
      - Security scoring system with real-time assessment
      - Multi-source data collection (HA, Node-RED, KNX)
      - AI-powered smart detection (away mode, device faults, door access, energy)
      - Natural language AI assistant for status queries and automation
      - Multi-channel notifications (Telegram, Bark, ServerChan)
      - Web management dashboard
      - Local SQLite data persistence
    zh_cn: |
      智能家居 AI 安全管家 - 基于 AI 的智能家居安全监控与自动化助手，集成 Home Assistant、Node-RED、KNX 网关等多种数据源，自动检测安全隐患并及时通知。

      **核心功能：**
      - 安全评分系统，实时评估家庭安全状况
      - 多源数据采集，支持 HA、Node-RED、KNX 网关
      - AI 智能检测：离家模式、设备故障、门禁异常、能耗异常
      - AI 智能助手：自然语言交互，查询状态、生成自动化
      - 多渠道通知：Telegram、Bark、Server酱
      - Web 管理后台，可视化界面
      - SQLite 本地持久化存储，数据不丢失
  icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/home-assistant.png
  category: Smart Home
  developer: symi-daguo
  version: 0.7.0
